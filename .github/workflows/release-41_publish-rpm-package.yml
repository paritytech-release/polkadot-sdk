name: Release - Publish polkadot RPM package

# This workflow publishes the polkadot RPM package by calling a reusable workflow.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Current final release tag in the format polkadot-stableYYMM or polkadot-stable-YYMM-X
        default: polkadot-stable2412
        required: true
        type: string
      distribution:
        description: Distribution where to publish rpm package (release, staging)
        default: release
        required: true
        type: string

  workflow_call:
    inputs:
      tag:
        description: Current final release tag in the format polkadot-stableYYMM or polkadot-stable-YYMM-X
        required: true
        type: string
      distribution:
        description: Distribution where to publish rpm package (release, staging)
        default: release
        required: true
        type: string
      skip_sync_check:
        description: Skip the synchronization check (used when called from a parent workflow that already performed the check)
        type: boolean
        default: false

jobs:
  check-synchronization:
    if: ${{ !inputs.skip_sync_check }}
    uses: paritytech-release/sync-workflows/.github/workflows/check-synchronization.yml@main
    with:
      concurrency_suffix: publish-rpm
    secrets:
      fork_writer_app_key: ${{ secrets.UPSTREAM_CONTENT_SYNC_APP_KEY }}
  call-publish-workflow:
    needs: [check-synchronization]
    if: ${{ !cancelled() && github.repository_owner == vars.RELEASE_ORG && vars.RELEASES_ON == 'true' && (needs.check-synchronization.result == 'skipped' || needs.check-synchronization.outputs.checks_passed == 'true') }}
    uses: ./.github/workflows/release-reusable-publish-packages.yml
    with:
      tag: ${{ inputs.tag }}
      distribution: ${{ inputs.distribution }}
      package_type: 'rpm'
      aws_repo_base_path: ${{ inputs.distribution == 'release' && 's3://releases-package-repos' || 's3://staging-package-repos' }}
      cloudfront_distribution_id: "E36FKEYWDXAZYJ"
    secrets: inherit
