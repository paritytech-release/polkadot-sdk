[package]
name = "sp-api-test"
version = "2.0.1"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
publish = false
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[dependencies]
codec = { workspace = true, default-features = true }
rustversion = { workspace = true }
sc-block-builder = { default-features = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }
sp-api = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
sp-externalities = { default-features = true, workspace = true }
sp-metadata-ir = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-state-machine = { default-features = true, workspace = true }
sp-tracing = { default-features = true, workspace = true }
sp-version = { default-features = true, workspace = true }
substrate-test-runtime-client = { workspace = true }
trybuild = { workspace = true }

[dev-dependencies]
criterion = { workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
sp-core = { default-features = true, workspace = true }
static_assertions = { workspace = true, default-features = true }

[features]
enable-staging-api = []
disable-ui-tests = []
