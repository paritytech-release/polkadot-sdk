[package]
name = "sp-virtualization"
version = "1.0.0"
license = "Apache-2.0"
authors.workspace = true
edition.workspace = true
repository.workspace = true
description = "Spawn a new polkavm instance from within the runtime/pvf"

[lints]
workspace = true

[dependencies]
codec = { workspace = true, default-features = false, features = ["bytes"] }
log = { workspace = true }
num_enum = { workspace = true, default-features = false }
polkavm = { workspace = true }

sp-runtime-interface = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }
sp-wasm-interface = { workspace = true, default-features = false }
strum = { features = ["derive"], workspace = true }

[dev-dependencies]
sp-tracing = { workspace = true }
sp-virtualization-test-fixture = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"num_enum/std",
	"polkavm/std",
	"sp-runtime-interface/std",
	"sp-std/std",
	"sp-tracing/std",
	"sp-wasm-interface/std",
	"strum/std",
]
