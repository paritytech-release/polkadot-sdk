[package]
name = "sp-virtualization"
version = "0.2.0"
license = "Apache-2.0"
authors.workspace = true
edition.workspace = true
repository.workspace = true
description = "Spawn a new polkavm instance from within the runtime/pvf"

[lints]
workspace = true

[dependencies]
codec = { workspace = true, default-features = false, features = ["bytes"] }
log = { workspace = true }
num_enum = { workspace = true, default-features = false }
polkavm = { workspace = true }
sp-runtime-interface.workspace = true
sp-runtime-interface.default-features = false
sp-std.workspace = true
sp-std.default-features = false
sp-wasm-interface.workspace = true
sp-wasm-interface.default-features = false
strum = { features = ["derive"], workspace = true }

[dev-dependencies]
sp-tracing = { path = "../tracing", default-features = false }
sp-virtualization-test-fixture = { path = "test-fixture", default-features = false }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"num_enum/std",
	"polkavm/std",
	"sp-runtime-interface/std",
	"sp-std/std",
	"sp-wasm-interface/std",
	"strum/std",
]
