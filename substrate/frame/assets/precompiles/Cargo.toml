[package]
name = "pallet-assets-precompiles"
version = "0.5.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Provides precompiles for `pallet-assets`"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
const-crypto = { version = "0.3.0", default-features = false }
ethereum-standards.workspace = true
frame-benchmarking = { workspace = true, optional = true }
frame-support.workspace = true
frame-system.workspace = true
k256 = { workspace = true, features = ["ecdsa"], optional = true }
log = { workspace = true }
pallet-assets.workspace = true
pallet-revive.workspace = true
pallet-timestamp.workspace = true
scale-info = { workspace = true }
sp-core.workspace = true
sp-io.workspace = true
sp-runtime.workspace = true
xcm.workspace = true

[dev-dependencies]
pallet-balances = { path = "../../balances", default-features = false }
pallet-revive-fixtures = { path = "../../revive/fixtures", default-features = false }
test-case = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"frame-benchmarking?/std",
	"frame-support/std",
	"frame-system/std",
	"k256?/std",
	"log/std",
	"pallet-assets/std",
	"pallet-revive/std",
	"pallet-timestamp/std",
	"scale-info/std",
	"sp-core/std",
	"sp-io/std",
	"sp-runtime/std",
	"xcm/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"k256",
	"pallet-assets/runtime-benchmarks",
	"pallet-revive/runtime-benchmarks",
	"pallet-timestamp/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-assets/try-runtime",
	"pallet-revive/try-runtime",
	"pallet-timestamp/try-runtime",
	"sp-runtime/try-runtime",
]
