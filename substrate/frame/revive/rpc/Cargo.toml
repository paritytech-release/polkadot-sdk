[package]
name = "pallet-revive-eth-rpc"
version = "0.14.0"
authors.workspace = true
edition = "2024"
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "An Ethereum JSON-RPC server for pallet-revive."
default-run = "eth-rpc"

[lints]
workspace = true

[package.metadata.polkadot-sdk]
exclude-from-umbrella = true

[[bin]]
name = "eth-rpc"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
codec = { workspace = true, features = ["derive"] }
derive_more = { workspace = true }
futures = { workspace = true, features = ["thread-pool"] }
hex = { workspace = true }
jsonrpsee = { workspace = true, features = ["full"] }
log = { workspace = true }
pallet-revive = { default-features = true, workspace = true }
prometheus-endpoint = { default-features = true, workspace = true }
rlp = { workspace = true }
sc-cli = { default-features = true, workspace = true }
sc-rpc = { default-features = true, workspace = true }
sc-rpc-api = { default-features = true, workspace = true }
sc-service = { default-features = true, workspace = true }
serde = { workspace = true, default-features = true, features = ["alloc", "derive"] }
serde_json = { workspace = true }
sp-arithmetic = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-crypto-hashing = { workspace = true }
sp-rpc = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-timestamp = { workspace = true }
sp-weights = { default-features = true, workspace = true }
sqlx = { workspace = true, features = ["macros", "runtime-tokio", "sqlite"] }
subxt = { workspace = true, default-features = true, features = ["reconnecting-rpc-client"] }
subxt-signer = { workspace = true, features = ["unstable-eth"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }

[dev-dependencies]
env_logger = { workspace = true }
pallet-revive-fixtures = { default-features = true, workspace = true }
pretty_assertions = { workspace = true }
revive-dev-node = { workspace = true }
sp-io = { default-features = true, workspace = true }
tempfile = { workspace = true }

[build-dependencies]
git2 = { workspace = true }
revive-dev-runtime = { default-features = true, workspace = true }
sp-io = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
