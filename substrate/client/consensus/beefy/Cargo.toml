[package]
name = "sc-consensus-beefy"
version = "35.0.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
repository.workspace = true
description = "BEEFY Client gadget for substrate"
homepage.workspace = true

[lints]
workspace = true

[dependencies]
array-bytes = { workspace = true, default-features = true }
async-channel = { workspace = true }
async-trait = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { default-features = true, workspace = true }
sc-client-api = { default-features = true, workspace = true }
sc-consensus = { default-features = true, workspace = true }
sc-network = { default-features = true, workspace = true }
sc-network-gossip = { default-features = true, workspace = true }
sc-network-sync = { default-features = true, workspace = true }
sc-network-types = { default-features = true, workspace = true }
sc-utils = { default-features = true, workspace = true }
sp-api = { default-features = true, workspace = true }
sp-application-crypto = { default-features = true, workspace = true }
sp-arithmetic = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
sp-consensus-beefy = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, default-features = true }
wasm-timer = { workspace = true }

[dev-dependencies]
sc-block-builder = { default-features = true, workspace = true }
sc-network-test = { workspace = true }
serde = { workspace = true, default-features = true }
sp-mmr-primitives = { default-features = true, workspace = true }
sp-tracing = { default-features = true, workspace = true }
substrate-test-runtime-client = { workspace = true }

[features]
# This feature adds BLS crypto primitives. It should not be used in production since
# the BLS implementation and interface may still be subject to significant change.
bls-experimental = [
	"sp-application-crypto/bls-experimental",
	"sp-consensus-beefy/bls-experimental",
	"sp-core/bls-experimental",
]
