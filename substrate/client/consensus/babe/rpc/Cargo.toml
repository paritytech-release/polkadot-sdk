[package]
name = "sc-consensus-babe-rpc"
version = "0.56.0"
authors.workspace = true
description = "RPC extensions for the BABE consensus algorithm"
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
futures = { workspace = true }
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true }
sc-consensus-babe = { default-features = true, workspace = true }
sc-consensus-epochs = { default-features = true, workspace = true }
sc-rpc-api = { default-features = true, workspace = true }
serde = { features = ["derive"], workspace = true, default-features = true }
sp-api = { default-features = true, workspace = true }
sp-application-crypto = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
sp-consensus-babe = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
sc-consensus = { default-features = true, workspace = true }
sc-transaction-pool-api = { default-features = true, workspace = true }
sp-keyring = { default-features = true, workspace = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }
