[package]
name = "sc-rpc"
version = "51.0.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Substrate Client RPC"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-channel = { workspace = true }
codec = { workspace = true, default-features = true }
futures = { workspace = true }
jsonrpsee = { features = ["server"], workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
sc-block-builder = { default-features = true, workspace = true }
sc-chain-spec = { default-features = true, workspace = true }
sc-client-api = { default-features = true, workspace = true }
sc-mixnet = { default-features = true, workspace = true }
sc-rpc-api = { default-features = true, workspace = true }
sc-statement-store = { default-features = true, workspace = true }
sc-tracing = { default-features = true, workspace = true }
sc-transaction-pool-api = { default-features = true, workspace = true }
sc-utils = { default-features = true, workspace = true }
serde_json = { workspace = true, default-features = true }
sp-api = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }
sp-offchain = { default-features = true, workspace = true }
sp-rpc = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-session = { default-features = true, workspace = true }
sp-statement-store = { default-features = true, workspace = true }
sp-version = { default-features = true, workspace = true }
tokio = { workspace = true, default-features = true }

[dev-dependencies]
assert_matches = { workspace = true }
futures-timer = { workspace = true }
pretty_assertions = { workspace = true }
sc-keystore = { workspace = true, default-features = false }
sc-network = { default-features = true, workspace = true }
sc-transaction-pool = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
sp-crypto-hashing = { default-features = true, workspace = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }

[features]
test-helpers = []
