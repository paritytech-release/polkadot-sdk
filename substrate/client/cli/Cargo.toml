[package]
name = "sc-cli"
version = "0.58.0"
authors.workspace = true
description = "Substrate CLI interface."
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true, default-features = true }
bip39 = { workspace = true, default-features = true, features = ["rand"] }
chrono = { workspace = true }
clap = { features = ["derive", "string", "wrap_help"], workspace = true }
codec = { workspace = true, default-features = true }
fdlimit = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
libp2p-identity = { features = ["ed25519", "peerid"], workspace = true }
log = { workspace = true, default-features = true }
names = { workspace = true }
rand = { workspace = true, default-features = true }
regex = { workspace = true }
rpassword = { workspace = true }
sc-client-api = { default-features = true, workspace = true }
sc-client-db = { default-features = false, workspace = true }
sc-keystore = { default-features = true, workspace = true }
sc-mixnet = { default-features = true, workspace = true }
sc-network = { default-features = true, workspace = true }
sc-service = { default-features = false, workspace = true }
sc-telemetry = { default-features = true, workspace = true }
sc-tracing = { default-features = true, workspace = true }
sc-transaction-pool = { default-features = true, workspace = true }
sc-utils = { default-features = true, workspace = true }
serde = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
sp-blockchain = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keyring = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }
sp-panic-handler = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-version = { default-features = true, workspace = true }
thiserror = { workspace = true }
tokio = { features = ["parking_lot", "rt-multi-thread", "signal"], workspace = true, default-features = true }

[dev-dependencies]
futures-timer = { workspace = true }
sp-tracing = { default-features = true, workspace = true }
tempfile = { workspace = true }

[features]
default = ["rocksdb"]
rocksdb = ["sc-client-db/rocksdb"]
