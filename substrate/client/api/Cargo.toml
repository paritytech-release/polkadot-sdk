[package]
name = "sc-client-api"
version = "45.0.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Substrate client interfaces."
documentation = "https://docs.rs/sc-client-api"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
fnv = { workspace = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { default-features = true, workspace = true }
sc-executor = { default-features = true, workspace = true }
sc-transaction-pool-api = { default-features = true, workspace = true }
sc-utils = { default-features = true, workspace = true }
sp-api = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
sp-core = { workspace = true }
sp-database = { default-features = true, workspace = true }
sp-externalities = { default-features = true, workspace = true }
sp-runtime = { workspace = true }
sp-state-machine = { default-features = true, workspace = true }
sp-storage = { default-features = true, workspace = true }
sp-trie = { default-features = true, workspace = true }

[dev-dependencies]
substrate-test-runtime = { workspace = true }
