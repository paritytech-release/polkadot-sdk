[package]
name = "statement-latency-bench"
version = "0.1.0"
description = "CLI tool for distributed statement store latency benchmarking"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "setup-allowances"
path = "src/setup.rs"

[[bin]]
name = "statement-latency-bench"
path = "src/bench.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
codec = { workspace = true }
env_logger = { workspace = true }
jsonrpsee = { workspace = true, features = ["client-ws-transport-tls", "ws-client"] }
log = { workspace = true }
rand = { workspace = true }
sc-statement-store = { workspace = true, default-features = true, features = ["test-helpers"] }
serde = { workspace = true, features = ["derive"] }
sp-core = { workspace = true, default-features = true }
sp-statement-store = { workspace = true, default-features = true, features = ["serde"] }
subxt = { version = "0.50", features = ["jsonrpsee", "native"] }
subxt-signer = { version = "0.50" }
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "time"] }
