[package]
name = "statement-latency-bench"
version = "0.1.0"
description = "CLI tool for distributed statement store latency benchmarking"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "statement-latency-bench"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
codec = { workspace = true }
env_logger = { workspace = true }
jsonrpsee = { workspace = true, features = ["client-ws-transport-tls", "ws-client"] }
log = { workspace = true }
rand = { workspace = true }
serde = { workspace = true, features = ["derive"] }
sp-core.default-features = true
sp-core.workspace = true
sp-statement-store = { workspace = true, features = ["serde"], default-features = true }
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "time"] }
