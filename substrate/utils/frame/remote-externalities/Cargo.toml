[package]
name = "frame-remote-externalities"
version = "0.57.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "An externalities provided environment that can load itself from remote nodes or cached files"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true }
futures = { workspace = true }
indicatif = { workspace = true }
jsonrpsee = { features = ["http-client", "ws-client"], workspace = true }
log = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
serde = { workspace = true, default-features = true }
sp-core.default-features = true
sp-core.workspace = true
sp-crypto-hashing.default-features = true
sp-crypto-hashing.workspace = true
sp-io.default-features = true
sp-io.workspace = true
sp-runtime.default-features = true
sp-runtime.workspace = true
sp-state-machine.default-features = true
sp-state-machine.workspace = true
spinners = { workspace = true }
substrate-rpc-client.default-features = true
substrate-rpc-client.workspace = true
tokio = { features = [
	"macros",
	"rt-multi-thread",
	"sync",
], workspace = true, default-features = true }

[dev-dependencies]
frame-support = { default-features = true, workspace = true }
jsonrpsee = { features = [
	"http-client",
	"server",
	"ws-client",
], workspace = true }
sp-tracing = { default-features = true, workspace = true }

[features]
remote-test = []
