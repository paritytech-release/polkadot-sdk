[package]
name = "frame-benchmarking-cli"
version = "54.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "CLI for benchmarking FRAME"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
Inflector = { workspace = true }
array-bytes = { workspace = true, default-features = true }
chrono = { workspace = true }
clap = { features = ["derive"], workspace = true }
codec = { workspace = true, default-features = true }
comfy-table = { workspace = true }
cumulus-client-parachain-inherent = { default-features = true, workspace = true }
cumulus-primitives-core = { default-features = true, workspace = true }
cumulus-primitives-proof-size-hostfunction = { default-features = true, workspace = true }
env_filter = { workspace = true }
frame-benchmarking = { default-features = true, workspace = true }
frame-storage-access-test-runtime = { default-features = true, workspace = true }
frame-support = { default-features = true, workspace = true }
frame-system = { default-features = true, workspace = true }
gethostname = { workspace = true }
handlebars = { workspace = true }
itertools = { workspace = true }
linked-hash-map = { workspace = true }
log = { workspace = true, default-features = true }
polkadot-parachain-primitives = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
rand = { features = ["small_rng"], workspace = true, default-features = true }
rand_pcg = { workspace = true }
sc-block-builder = { default-features = true, workspace = true }
sc-chain-spec = { workspace = true }
sc-cli = { default-features = false, workspace = true }
sc-client-api = { default-features = true, workspace = true }
sc-client-db = { default-features = false, workspace = true }
sc-executor = { default-features = true, workspace = true }
sc-executor-common = { workspace = true }
sc-executor-wasmtime = { workspace = true }
sc-runtime-utilities = { default-features = true, workspace = true }
sc-service = { default-features = false, workspace = true }
sc-sysinfo = { default-features = true, workspace = true }
serde = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
sp-api = { default-features = true, workspace = true }
sp-block-builder = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-database = { default-features = true, workspace = true }
sp-externalities = { default-features = true, workspace = true }
sp-genesis-builder = { default-features = true, workspace = true }
sp-inherents = { default-features = true, workspace = true }
sp-io = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-runtime-interface = { default-features = true, workspace = true }
sp-state-machine = { default-features = true, workspace = true }
sp-storage = { default-features = true, workspace = true }
sp-timestamp = { default-features = true, workspace = true }
sp-transaction-pool = { default-features = true, workspace = true }
sp-trie = { default-features = true, workspace = true }
sp-version = { default-features = true, workspace = true }
sp-wasm-interface = { default-features = true, workspace = true }
subxt = { workspace = true, features = ["native"] }
subxt-signer = { workspace = true, features = ["unstable-eth"] }
thiserror = { workspace = true }
thousands = { workspace = true }

[dev-dependencies]
cumulus-test-runtime = { default-features = true, workspace = true }
substrate-test-runtime = { default-features = true, workspace = true }
westend-runtime = { default-features = true, workspace = true }

[features]
default = []
runtime-benchmarks = [
	"cumulus-primitives-core/runtime-benchmarks",
	"frame-benchmarking/runtime-benchmarks",
	"frame-storage-access-test-runtime/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"polkadot-parachain-primitives/runtime-benchmarks",
	"polkadot-primitives/runtime-benchmarks",
	"sc-client-db/runtime-benchmarks",
	"sc-service/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
	"westend-runtime/runtime-benchmarks",
]
rocksdb = ["sc-cli/rocksdb", "sc-client-db/rocksdb"]
