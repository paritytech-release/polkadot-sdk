[package]
name = "frame-omni-bencher"
version = "0.18.1"
description = "Freestanding benchmark runner for any Polkadot runtime."
authors.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
readme = "README.md"

[lints]
workspace = true

[dependencies]
clap = { features = ["derive"], workspace = true }
cumulus-primitives-proof-size-hostfunction = { default-features = true, workspace = true }
frame-benchmarking-cli = { workspace = true }
polkadot-jemalloc-shim = { workspace = true }
sc-cli = { workspace = true, default-features = true }
sp-crypto-ec-utils = { workspace = true, default-features = true, features = ["rfc163"] }
sp-runtime = { workspace = true, default-features = true }
sp-statement-store = { workspace = true, default-features = true }
tracing-subscriber = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
polkadot-jemalloc-shim = { workspace = true, features = ["jemalloc-allocator"] }

[dev-dependencies]
assert_cmd = { workspace = true }
cumulus-test-runtime = { workspace = true }
sc-chain-spec = { workspace = true, default-features = false }
sp-genesis-builder = { default-features = true, workspace = true }
tempfile = { workspace = true }
