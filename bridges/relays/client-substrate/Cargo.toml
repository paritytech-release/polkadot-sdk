pallet-transaction-payment = { default-features = true, workspace = true }
pallet-transaction-payment-rpc-runtime-api = { default-features = true, workspace = true }
pallet-utility = { default-features = true, workspace = true }
quick_cache = { workspace = true }
rand = { workspace = true, default-features = true }
relay-utils = { workspace = true }
sc-chain-spec = { default-features = true, workspace = true }
sc-rpc-api = { default-features = true, workspace = true }
sc-transaction-pool-api = { default-features = true, workspace = true }
scale-info = { features = ["derive"], workspace = true, default-features = true }
serde_json = { workspace = true }
sp-consensus-grandpa = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-rpc = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-std = { default-features = true, workspace = true }
sp-trie = { default-features = true, workspace = true }
