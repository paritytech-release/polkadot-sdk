bp-messages = { default-features = true, workspace = true }
bp-polkadot-core = { default-features = true, workspace = true }
bp-runtime = { default-features = true, workspace = true }
codec = { workspace = true, default-features = true }
finality-relay = { workspace = true }
frame-support = { default-features = true, workspace = true }
futures = { workspace = true }
jsonrpsee = { features = ["macros", "ws-client"], workspace = true }
