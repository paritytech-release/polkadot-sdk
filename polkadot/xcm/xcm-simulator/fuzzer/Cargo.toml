[package]
name = "xcm-simulator-fuzzer"
description = "Examples of xcm-simulator usage."
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lints]
workspace = true

[[bin]]
path = "src/fuzz.rs"
name = "xcm-fuzzer"

[dependencies]
arbitrary = { workspace = true }
codec = { workspace = true, default-features = true }
frame-executive = { default-features = true, workspace = true }
frame-support = { default-features = true, workspace = true }
frame-system = { default-features = true, workspace = true }
frame-try-runtime = { default-features = true, workspace = true }
honggfuzz = { workspace = true }
pallet-balances = { default-features = true, workspace = true }
pallet-message-queue = { default-features = true, workspace = true }
pallet-xcm = { default-features = true, workspace = true }
polkadot-core-primitives = { default-features = true, workspace = true }
polkadot-parachain-primitives = { default-features = true, workspace = true }
polkadot-runtime-parachains = { default-features = true, workspace = true }
scale-info = { features = ["derive"], workspace = true, default-features = true }
sp-core = { default-features = true, workspace = true }
sp-io = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
xcm = { default-features = true, workspace = true }
xcm-builder = { default-features = true, workspace = true }
xcm-executor = { default-features = true, workspace = true }
xcm-simulator = { default-features = true, workspace = true }

[features]
try-runtime = [
	"frame-executive/try-runtime",
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"frame-try-runtime/try-runtime",
	"pallet-balances/try-runtime",
	"pallet-message-queue/try-runtime",
	"pallet-xcm/try-runtime",
	"polkadot-runtime-parachains/try-runtime",
	"sp-runtime/try-runtime",
]
runtime-benchmarks = [
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-balances/runtime-benchmarks",
	"pallet-message-queue/runtime-benchmarks",
	"pallet-xcm/runtime-benchmarks",
	"polkadot-parachain-primitives/runtime-benchmarks",
	"polkadot-runtime-parachains/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
