[package]
name = "polkadot-network-bridge"
version = "29.0.0"
description = "The Network Bridge Subsystem — protocol multiplexer for Polkadot."
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
always-assert = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true, default-features = true }
codec = { features = ["derive"], workspace = true }
fatality = { workspace = true }
futures = { workspace = true }
gum = { default-features = true, workspace = true }
parking_lot = { workspace = true, default-features = true }
polkadot-node-metrics = { default-features = true, workspace = true }
polkadot-node-network-protocol = { default-features = true, workspace = true }
polkadot-node-subsystem = { default-features = true, workspace = true }
polkadot-overseer = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
sc-network = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
futures-timer = { workspace = true }
polkadot-node-subsystem-test-helpers = { workspace = true }
polkadot-node-subsystem-util = { default-features = true, workspace = true }
polkadot-primitives-test-helpers = { workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keyring = { default-features = true, workspace = true }
strum = { features = ["derive"], workspace = true }
