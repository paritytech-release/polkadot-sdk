[package]
name = "polkadot-collator-protocol"
version = "29.1.0"
description = "Polkadot Collator Protocol subsystem. Allows collators and validators to talk to each other."
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
bitvec = { features = ["alloc"], workspace = true }
futures = { workspace = true }
futures-timer = { workspace = true }
gum = { default-features = true, workspace = true }
schnellru = { workspace = true }
sp-consensus-babe = { default-features = true, workspace = true }
sp-consensus-slots = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-timestamp = { default-features = true, workspace = true }

codec = { workspace = true }
fatality = { workspace = true }
polkadot-node-network-protocol = { default-features = true, workspace = true }
polkadot-node-primitives = { default-features = true, workspace = true }
polkadot-node-subsystem = { default-features = true, workspace = true }
polkadot-node-subsystem-util = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
kvdb-memorydb = { workspace = true }
rstest = { workspace = true }
sc-network-types = { default-features = true, workspace = true }
sp-tracing = { default-features = false, workspace = true }
tokio = { features = ["macros"], workspace = true, default-features = true }

codec = { features = ["std"], workspace = true, default-features = true }
sc-keystore = { default-features = true, workspace = true }
sc-network = { default-features = true, workspace = true }
sp-core = { features = ["std"], default-features = true, workspace = true }
sp-keyring = { default-features = true, workspace = true }

itertools = { workspace = true }
polkadot-node-subsystem-test-helpers = { workspace = true }
polkadot-primitives-test-helpers = { workspace = true }

[features]
default = []
