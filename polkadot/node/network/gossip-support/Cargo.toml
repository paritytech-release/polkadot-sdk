[package]
name = "polkadot-gossip-support"
version = "29.0.0"
description = "Polkadot Gossip Support subsystem. Responsible for keeping track of session changes and issuing a connection request to the relevant validators on every new session."
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
polkadot-node-network-protocol = { default-features = true, workspace = true }
polkadot-node-subsystem = { default-features = true, workspace = true }
polkadot-node-subsystem-util = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
sc-network = { default-features = true, workspace = true }
sp-application-crypto = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-crypto-hashing = { default-features = true, workspace = true }
sp-keystore = { default-features = true, workspace = true }

futures = { workspace = true }
futures-timer = { workspace = true }
gum = { default-features = true, workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }

[dev-dependencies]
sp-authority-discovery = { default-features = true, workspace = true }
sp-consensus-babe = { default-features = true, workspace = true }
sp-keyring = { default-features = true, workspace = true }
sp-tracing = { default-features = true, workspace = true }

polkadot-node-subsystem-test-helpers = { workspace = true }

assert_matches = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true, default-features = true }
quickcheck = { workspace = true, default-features = true }
