[package]
name = "polkadot-test-service"
publish = false
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
frame-system = { default-features = true, workspace = true }
futures = { workspace = true }
pallet-balances = { default-features = true, workspace = true }
pallet-staking = { default-features = true, workspace = true }
pallet-transaction-payment = { default-features = true, workspace = true }
polkadot-node-primitives = { default-features = true, workspace = true }
polkadot-node-subsystem = { default-features = true, workspace = true }
polkadot-overseer = { default-features = true, workspace = true }
polkadot-parachain-primitives = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
polkadot-runtime-common = { default-features = true, workspace = true }
polkadot-runtime-parachains = { default-features = true, workspace = true }
polkadot-service = { default-features = true, workspace = true }
polkadot-test-runtime = { workspace = true }
rand = { workspace = true, default-features = true }
sc-chain-spec = { default-features = true, workspace = true }
sc-cli = { default-features = true, workspace = true }
sc-client-api = { default-features = true, workspace = true }
sc-consensus = { default-features = true, workspace = true }
sc-consensus-grandpa = { default-features = true, workspace = true }
sc-network = { default-features = true, workspace = true }
sc-service = { workspace = true }
sc-tracing = { default-features = true, workspace = true }
serde_json = { workspace = true, default-features = true }
sp-arithmetic = { default-features = true, workspace = true }
sp-authority-discovery = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-consensus = { default-features = true, workspace = true }
sp-consensus-babe = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-keyring = { default-features = true, workspace = true }
sp-runtime = { default-features = true, workspace = true }
sp-state-machine = { default-features = true, workspace = true }
substrate-test-client = { workspace = true }
test-runtime-constants = { default-features = true, workspace = true }
tokio = { workspace = true, default-features = true }

[dev-dependencies]
pallet-balances = { workspace = true, default-features = false }
tokio = { features = ["macros"], workspace = true, default-features = true }

[features]
runtime-metrics = ["polkadot-test-runtime/runtime-metrics"]
runtime-benchmarks = [
	"frame-system/runtime-benchmarks",
	"pallet-balances/runtime-benchmarks",
	"pallet-staking/runtime-benchmarks",
	"pallet-transaction-payment/runtime-benchmarks",
	"polkadot-parachain-primitives/runtime-benchmarks",
	"polkadot-primitives/runtime-benchmarks",
	"polkadot-runtime-common/runtime-benchmarks",
	"polkadot-runtime-parachains/runtime-benchmarks",
	"polkadot-service/runtime-benchmarks",
	"polkadot-test-runtime/runtime-benchmarks",
	"sc-service/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
]
