[package]
name = "polkadot-node-core-pvf-execute-worker"
description = "Polkadot crate that contains the logic for executing PVFs. Used by the polkadot-execute-worker binary."
version = "25.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.polkadot-sdk]
exclude-from-umbrella = true

[dependencies]
cfg-if = { workspace = true }
cpu-time = { workspace = true }
gum = { default-features = true, workspace = true }
libc = { workspace = true }
nix = { features = ["process", "resource", "sched"], workspace = true }

codec = { features = ["derive"], workspace = true }
polkadot-node-core-pvf-common = { default-features = true, workspace = true }
polkadot-node-primitives = { default-features = true, workspace = true }
polkadot-parachain-primitives = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
sp-maybe-compressed-blob = { default-features = true, workspace = true }

[features]
builder = []
