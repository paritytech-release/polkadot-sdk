[package]
name = "polkadot-node-core-pvf-common"
description = "Polkadot crate that contains functionality related to PVFs that is shared by the PVF host and the PVF workers."
version = "25.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
cpu-time = { workspace = true }
futures = { workspace = true }
gum = { default-features = true, workspace = true }
libc = { workspace = true }
nix = { features = ["resource", "sched"], workspace = true }
thiserror = { workspace = true }

codec = { features = ["derive"], workspace = true }
polkadot-node-primitives = { default-features = true, workspace = true }
polkadot-parachain-primitives = { default-features = true, workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
sc-executor = { default-features = true, workspace = true }
sc-executor-common = { default-features = true, workspace = true }
sc-executor-wasmtime = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
sp-crypto-ec-utils = { workspace = true, features = ["rfc163"], default-features = true }
sp-crypto-hashing = { default-features = true, workspace = true }
sp-externalities = { default-features = true, workspace = true }
sp-io = { default-features = true, workspace = true }
sp-tracing = { default-features = true, workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
landlock = { workspace = true }

[target.'cfg(all(target_os = "linux", target_arch = "x86_64"))'.dependencies]
seccompiler = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
wat = { workspace = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
tempfile = { workspace = true }

[features]
# This feature is used to export test code to other crates without putting it in the production build.
test-utils = []
jemalloc-allocator = []
