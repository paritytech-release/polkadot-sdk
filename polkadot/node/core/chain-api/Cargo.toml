[package]
name = "polkadot-node-core-chain-api"
version = "29.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "The Chain API subsystem provides access to chain related utility functions like block number to hash conversions."
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
futures = { workspace = true }
gum = { default-features = true, workspace = true }
polkadot-node-metrics = { default-features = true, workspace = true }
polkadot-node-subsystem = { default-features = true, workspace = true }
polkadot-node-subsystem-types = { default-features = true, workspace = true }
sc-client-api = { default-features = true, workspace = true }
sc-consensus-babe = { default-features = true, workspace = true }

[dev-dependencies]
codec = { workspace = true, default-features = true }
futures = { features = ["thread-pool"], workspace = true }
maplit = { workspace = true }
polkadot-node-primitives = { default-features = true, workspace = true }
polkadot-node-subsystem-test-helpers = { workspace = true }
polkadot-primitives = { default-features = true, workspace = true }
sp-blockchain = { default-features = true, workspace = true }
sp-core = { default-features = true, workspace = true }
